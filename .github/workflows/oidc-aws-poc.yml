name: OIDC AWS PoC
on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Test note'
        required: false
        default: 'baseline'

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Decode OIDC Token Claims
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('sts.amazonaws.com')
            const parts = token.split('.')
            const payload = JSON.parse(Buffer.from(parts[1], 'base64url').toString())
            core.info('=== OIDC Token Claims ===')
            core.info('sub: ' + payload.sub)
            core.info('aud: ' + payload.aud)
            core.info('ref: ' + payload.ref)
            core.info('environment: ' + (payload.environment || 'none'))

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::526958954020:role/github-oidc-poc
          aws-region: us-east-1

      - name: Prove AWS Access
        run: |
          echo "=== AWS Identity ==="
          aws sts get-caller-identity
          echo ""
          echo "=== SUCCESS: Assumed AWS role via OIDC ==="