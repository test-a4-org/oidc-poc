name: OIDC AWS PoC
on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Test note'
        required: false
        default: 'baseline'

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Get OIDC Token and decode claims
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('sts.amazonaws.com')
            const parts = token.split('.')
            const payload = JSON.parse(Buffer.from(parts[1], 'base64url').toString())
            core.info('=== OIDC Token Claims ===')
            core.info('sub: ' + payload.sub)
            core.info('aud: ' + payload.aud)
            core.info('ref: ' + payload.ref)
            core.info('environment: ' + (payload.environment || 'none'))
            core.info('repository: ' + payload.repository)
            core.info('Full sub claim: ' + payload.sub)
            core.setOutput('sub_claim', payload.sub)
            core.setOutput('full_token', token)